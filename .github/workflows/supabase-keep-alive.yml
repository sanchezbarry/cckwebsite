name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 */2 * *"   # every 2 days at midnight UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Keep Alive Route
        run: |
          curl --fail --silent --show-error https://cckwebsite.vercel.app/api/keep-alive
